<div class="login-wrapper">

  <div class="login-card">

    <h1>Welcome Back</h1>

    <p class="subtitle">
      Login to continue your SmartPrep AI journey
    </p>

    <input
      type="email"
      [(ngModel)]="email"
      placeholder="Enter Email"
    >

    <input
      type="password"
      [(ngModel)]="password"
      placeholder="Enter Password"
    >

    <button (click)="login()">
      Login
    </button>

    <p class="register-text">
      New User?
      <a routerLink="/register">Register</a>
    </p>

  </div>

</div>
