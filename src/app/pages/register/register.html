<div class="register-wrapper">

  <div class="register-card">

    <h1>Create Account</h1>

    <p class="subtitle">
      Start your SmartPrep AI journey today
    </p>

    <div class="form-grid">

      <input [(ngModel)]="user.name" placeholder="Full Name">

      <input [(ngModel)]="user.email" placeholder="Email">

      <input [(ngModel)]="user.password"
             type="password"
             placeholder="Password">

      <input [(ngModel)]="user.college" placeholder="College">

      <input [(ngModel)]="user.branch" placeholder="Branch">

      <input [(ngModel)]="user.graduationYear"
             placeholder="Graduation Year">

      <input [(ngModel)]="user.skills"
             placeholder="Skills"
             class="full-width">

    </div>

    <button (click)="register()">
      Register
    </button>

    <p class="login-text">
      Already user?
      <a routerLink="/login">Login</a>
    </p>

  </div>

</div>
